name: Update

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "update publishes data; verify checks verified-data"
        required: true
        default: update
        type: choice
        options: [update, verify]
      date:
        description: "Optional Asia/Amman date (YYYY-MM-DD)"
        required: false
        type: string
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Amman"

permissions:
  contents: write
  issues: write

concurrency:
  group: orthodox-daily-data
  cancel-in-progress: false

env:
  VERIFIED_DATA_BRANCH: verified-data
  ORTHODOX_ENABLE_LIVE_SOURCE_FETCH: "1"

jobs:
  daily:
    # Store DATA_SIGNING_PRIVATE_KEY_B64 in this protected Environment, not as
    # an unrestricted repository secret. The private key is materialized only
    # after all external-source fetching and unsigned validation have finished.
    environment: production-data-signing
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Resolve mode and date
        id: resolve
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_MODE:-}" ]]; then MODE="$INPUT_MODE"; else MODE=update; fi
          if [[ -n "${INPUT_DATE:-}" ]]; then DATE="$INPUT_DATE"; else DATE="$(TZ=Asia/Amman date +%F)"; fi
          [[ "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          REVISION=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        if: steps.resolve.outputs.mode == 'update'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout published data
        if: steps.resolve.outputs.mode == 'verify'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: verified-data
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Generate and validate today without signing key
        if: steps.resolve.outputs.mode == 'update'
        run: |
          python scripts/update.py --date "${{ steps.resolve.outputs.date }}" --unsigned
          python scripts/validate_daily_ui_localizations.py data/calendar/today.json
          python scripts/validate_jordan_liturgical_contract.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}" --require-jordan-authority --require-complete-liturgy
          python scripts/validate_source_intelligence.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Clear only today's language-lane publication slots
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "data/daily/${{ steps.resolve.outputs.date }}" data/daily/current
          mkdir -p "data/daily/${{ steps.resolve.outputs.date }}" data/daily/current

      - name: Update Arabic lane — Amman, Jerusalem, Antioch
        id: lane_ar
        if: steps.resolve.outputs.mode == 'update'
        continue-on-error: true
        run: python scripts/update_language_lane.py --language ar --date "${{ steps.resolve.outputs.date }}" --unsigned

      - name: Update Greek lane — official Greek Orthodox sources
        id: lane_el
        if: steps.resolve.outputs.mode == 'update'
        continue-on-error: true
        run: python scripts/update_language_lane.py --language el --date "${{ steps.resolve.outputs.date }}" --unsigned

      - name: Update English lane — GOARCH, Jerusalem, Antioch
        id: lane_en
        if: steps.resolve.outputs.mode == 'update'
        continue-on-error: true
        run: python scripts/update_language_lane.py --language en --date "${{ steps.resolve.outputs.date }}" --unsigned

      - name: Require at least one publishable language lane
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          ok=0
          [[ "${{ steps.lane_ar.outcome }}" == success ]] && ok=$((ok+1))
          [[ "${{ steps.lane_el.outcome }}" == success ]] && ok=$((ok+1))
          [[ "${{ steps.lane_en.outcome }}" == success ]] && ok=$((ok+1))
          test "$ok" -gt 0 || { echo "All three language lanes failed" >&2; exit 1; }
          echo "Publishable language lanes: $ok/3"

      - name: Remove incomplete outputs from failed language lanes
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          DATE="${{ steps.resolve.outputs.date }}"
          [[ "${{ steps.lane_ar.outcome }}" == success ]] || rm -f "data/daily/$DATE/ar.json" "data/daily/$DATE/ar.json.sig" data/daily/current/ar.json data/daily/current/ar.json.sig
          [[ "${{ steps.lane_el.outcome }}" == success ]] || rm -f "data/daily/$DATE/el.json" "data/daily/$DATE/el.json.sig" data/daily/current/el.json data/daily/current/el.json.sig
          [[ "${{ steps.lane_en.outcome }}" == success ]] || rm -f "data/daily/$DATE/en.json" "data/daily/$DATE/en.json.sig" data/daily/current/en.json data/daily/current/en.json.sig

      - name: Validate unsigned language lanes independently
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ steps.lane_ar.outcome }}" != success ]] || python scripts/verify_language_lanes.py --date "${{ steps.resolve.outputs.date }}" --language ar --unsigned
          [[ "${{ steps.lane_el.outcome }}" != success ]] || python scripts/verify_language_lanes.py --date "${{ steps.resolve.outputs.date }}" --language el --unsigned
          [[ "${{ steps.lane_en.outcome }}" != success ]] || python scripts/verify_language_lanes.py --date "${{ steps.resolve.outputs.date }}" --language en --unsigned

      - name: Require one consistent unsigned publication date
        if: steps.resolve.outputs.mode == 'update'
        run: python scripts/validate_publication_consistency.py --expected-date "${{ steps.resolve.outputs.date }}" --unsigned

      - name: Prepare publication worktree before restoring key
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$RUNNER_TEMP/verified-data"
          rm -rf "$TARGET"
          git fetch origin "$VERIFIED_DATA_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$VERIFIED_DATA_BRANCH"; then
            git worktree add --force --detach "$TARGET" "origin/$VERIFIED_DATA_BRANCH"
          else
            git worktree add --force --detach "$TARGET" HEAD
          fi
          echo "PUBLICATION_TARGET=$TARGET" >> "$GITHUB_ENV"

      - name: Restore and match the one signing key
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        env:
          DATA_SIGNING_PRIVATE_KEY_B64: ${{ secrets.DATA_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          test -n "$DATA_SIGNING_PRIVATE_KEY_B64" || { echo "DATA_SIGNING_PRIVATE_KEY_B64 is required" >&2; exit 1; }
          printf '%s' "$DATA_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/data-private.pem"
          chmod 600 "$RUNNER_TEMP/data-private.pem"
          openssl pkey -in "$RUNNER_TEMP/data-private.pem" -check -noout
          openssl pkey -in "$RUNNER_TEMP/data-private.pem" -pubout -out "$RUNNER_TEMP/derived-public.pem"
          openssl pkey -pubin -in canonical/signing/data_signing_public_key.pub -outform DER -out "$RUNNER_TEMP/committed.der"
          openssl pkey -pubin -in "$RUNNER_TEMP/derived-public.pem" -outform DER -out "$RUNNER_TEMP/derived.der"
          cmp -s "$RUNNER_TEMP/committed.der" "$RUNNER_TEMP/derived.der" || {
            echo "The GitHub secret does not match the public key committed in the app." >&2
            echo "Replace DATA_SIGNING_PRIVATE_KEY_B64 with the v4 key supplied with this release." >&2
            exit 1
          }

      - name: Sign and verify generated data
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/sign_daily_data.py --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/verify_data_signature.py
          python scripts/sign_language_lanes.py --date "${{ steps.resolve.outputs.date }}" --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/verify_language_lanes.py --date "${{ steps.resolve.outputs.date }}"
          python scripts/validate_publication_consistency.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/build_update_manifest.py --date "${{ steps.resolve.outputs.date }}" --revision "${{ steps.resolve.outputs.revision }}"
          python scripts/sign_update_manifest.py --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/verify_update_manifest.py --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Assemble and sign exact publication tree
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="$GITHUB_WORKSPACE"
          TARGET="$PUBLICATION_TARGET"
          mkdir -p "$TARGET/data" "$TARGET/app/src/main/assets/data"
          rsync -a --delete "$SOURCE/data/" "$TARGET/data/"
          rsync -a --delete "$SOURCE/app/src/main/assets/data/" "$TARGET/app/src/main/assets/data/"
          cp "$SOURCE/requirements-dev.txt" "$TARGET/requirements-dev.txt"
          cp "$SOURCE/.gitattributes" "$TARGET/.gitattributes"
          mkdir -p "$TARGET/scripts" "$TARGET/canonical/signing"
          cp "$SOURCE/scripts/verify.py" "$SOURCE/scripts/verify_data_signature.py" "$SOURCE/scripts/verify_language_lanes.py" "$SOURCE/scripts/verify_update_manifest.py" "$SOURCE/scripts/validate_publication_consistency.py" "$SOURCE/scripts/validate_partial_daily.py" "$SOURCE/scripts/validate_jordan_liturgical_contract.py" "$SOURCE/scripts/orthodox_integrity.py" "$SOURCE/scripts/official_sources.py" "$SOURCE/scripts/source_connectors.py" "$SOURCE/scripts/attach_source_intelligence.py" "$SOURCE/scripts/validate_source_intelligence.py" "$SOURCE/scripts/sign_daily_data.py" "$SOURCE/scripts/sign_language_lanes.py" "$SOURCE/scripts/build_update_manifest.py" "$SOURCE/scripts/sign_update_manifest.py" "$TARGET/scripts/"
          cp "$SOURCE/canonical/signing/data_signing_public_key.pub" "$TARGET/canonical/signing/"
          cp "$SOURCE/canonical/jordan_liturgical_contract.json" "$SOURCE/canonical/update_contract.json" "$SOURCE/canonical/source_connectors.json" "$TARGET/canonical/"

          cd "$TARGET"
          python scripts/sign_daily_data.py --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/sign_language_lanes.py --date "${{ steps.resolve.outputs.date }}" --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/validate_publication_consistency.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/build_update_manifest.py --date "${{ steps.resolve.outputs.date }}" --revision "${{ steps.resolve.outputs.revision }}"
          python scripts/sign_update_manifest.py --private-key "$RUNNER_TEMP/data-private.pem"
          python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/validate_jordan_liturgical_contract.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}" --require-jordan-authority --require-complete-liturgy
          python scripts/validate_source_intelligence.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Remove private key before commit or network publication
        if: ${{ always() && steps.resolve.outputs.mode == 'update' }}
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/data-private.pem" "$RUNNER_TEMP/derived-public.pem" "$RUNNER_TEMP/committed.der" "$RUNNER_TEMP/derived.der"

      - name: Commit, verify Git blobs, and publish verified-data
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$PUBLICATION_TARGET"
          cd "$TARGET"
          test ! -e "$RUNNER_TEMP/data-private.pem"
          git checkout -B "$VERIFIED_DATA_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish daily data ${{ steps.resolve.outputs.date }}"

          COMMIT_CHECK="$RUNNER_TEMP/verified-data-commit-check"
          rm -rf "$COMMIT_CHECK"
          mkdir -p "$COMMIT_CHECK"
          git archive HEAD | tar -x -C "$COMMIT_CHECK"
          cd "$COMMIT_CHECK"
          python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/validate_source_intelligence.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}"
          cd "$TARGET"
          git push --force-with-lease origin "HEAD:$VERIFIED_DATA_BRANCH"

      - name: Verify from origin after publishing
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          CHECK="$RUNNER_TEMP/published-check"
          git clone --depth 1 --branch "$VERIFIED_DATA_BRANCH" "https://github.com/$GITHUB_REPOSITORY.git" "$CHECK"
          cd "$CHECK"
          python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/validate_source_intelligence.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Verify scheduled publication
        if: steps.resolve.outputs.mode == 'verify'
        shell: bash
        run: |
          python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"
          python scripts/validate_source_intelligence.py data/calendar/today.json --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Open failure alert
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Orthodox daily update failed"
          BODY="Update/verification failed for ${{ steps.resolve.outputs.date }}. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          EXISTING="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')"
          if [[ -n "$EXISTING" ]]; then gh issue comment "$EXISTING" --body "$BODY"; else gh issue create --title "$TITLE" --body "$BODY"; fi
