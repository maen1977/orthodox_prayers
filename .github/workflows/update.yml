name: Update

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "update publishes data; verify checks verified-data"
        required: true
        default: update
        type: choice
        options: [update, verify]
      date:
        description: "Optional Asia/Amman date (YYYY-MM-DD)"
        required: false
        type: string
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Amman"
    - cron: "15 0 * * *"
      timezone: "Asia/Amman"

permissions:
  contents: write
  issues: write

concurrency:
  group: orthodox-daily-data
  cancel-in-progress: false

env:
  VERIFIED_DATA_BRANCH: verified-data

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Resolve mode and date
        id: resolve
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_MODE:-}" ]]; then MODE="$INPUT_MODE"; elif [[ "${SCHEDULE:-}" == "15 0 * * *" ]]; then MODE=verify; else MODE=update; fi
          if [[ -n "${INPUT_DATE:-}" ]]; then DATE="$INPUT_DATE"; else DATE="$(TZ=Asia/Amman date +%F)"; fi
          [[ "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        if: steps.resolve.outputs.mode == 'update'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout published data
        if: steps.resolve.outputs.mode == 'verify'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: verified-data
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Restore and match the one signing key
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        env:
          DATA_SIGNING_PRIVATE_KEY_B64: ${{ secrets.DATA_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          test -n "$DATA_SIGNING_PRIVATE_KEY_B64" || { echo "DATA_SIGNING_PRIVATE_KEY_B64 is required" >&2; exit 1; }
          printf '%s' "$DATA_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/data-private.pem"
          chmod 600 "$RUNNER_TEMP/data-private.pem"
          openssl pkey -in "$RUNNER_TEMP/data-private.pem" -check -noout
          openssl pkey -in "$RUNNER_TEMP/data-private.pem" -pubout -out "$RUNNER_TEMP/derived-public.pem"
          openssl pkey -pubin -in canonical/signing/data_signing_public_key.pub -outform DER -out "$RUNNER_TEMP/committed.der"
          openssl pkey -pubin -in "$RUNNER_TEMP/derived-public.pem" -outform DER -out "$RUNNER_TEMP/derived.der"
          cmp -s "$RUNNER_TEMP/committed.der" "$RUNNER_TEMP/derived.der" || {
            echo "The GitHub secret does not match the public key committed in the app." >&2
            echo "Replace DATA_SIGNING_PRIVATE_KEY_B64 with the v4 key supplied with this release." >&2
            exit 1
          }

      - name: Generate, validate, and sign today
        if: steps.resolve.outputs.mode == 'update'
        run: python scripts/update.py --date "${{ steps.resolve.outputs.date }}" --private-key "$RUNNER_TEMP/data-private.pem"

      - name: Publish verified-data
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="$GITHUB_WORKSPACE"
          TARGET="$RUNNER_TEMP/verified-data"
          git fetch origin "$VERIFIED_DATA_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$VERIFIED_DATA_BRANCH"; then
            git worktree add --force --detach "$TARGET" "origin/$VERIFIED_DATA_BRANCH"
          else
            git worktree add --force --detach "$TARGET" HEAD
          fi
          mkdir -p "$TARGET/data" "$TARGET/app/src/main/assets/data"
          rsync -a --delete "$SOURCE/data/" "$TARGET/data/"
          rsync -a --delete "$SOURCE/app/src/main/assets/data/" "$TARGET/app/src/main/assets/data/"
          cp "$SOURCE/requirements-dev.txt" "$TARGET/requirements-dev.txt"
          mkdir -p "$TARGET/scripts" "$TARGET/canonical/signing"
          cp "$SOURCE/scripts/verify.py" "$SOURCE/scripts/verify_data_signature.py" "$SOURCE/scripts/validate_partial_daily.py" "$TARGET/scripts/"
          cp "$SOURCE/canonical/signing/data_signing_public_key.pub" "$TARGET/canonical/signing/"
          cd "$TARGET"
          git checkout -B "$VERIFIED_DATA_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish daily data ${{ steps.resolve.outputs.date }}"
          git push --force-with-lease origin "HEAD:$VERIFIED_DATA_BRANCH"

      - name: Verify from origin after publishing
        if: steps.resolve.outputs.mode == 'update'
        shell: bash
        run: |
          set -euo pipefail
          CHECK="$RUNNER_TEMP/published-check"
          git clone --depth 1 --branch "$VERIFIED_DATA_BRANCH" "https://github.com/$GITHUB_REPOSITORY.git" "$CHECK"
          cd "$CHECK"
          python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Verify scheduled publication
        if: steps.resolve.outputs.mode == 'verify'
        run: python scripts/verify.py --expected-date "${{ steps.resolve.outputs.date }}"

      - name: Open failure alert
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Orthodox daily update failed"
          BODY="Update/verification failed for ${{ steps.resolve.outputs.date }}. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          EXISTING="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')"
          if [[ -n "$EXISTING" ]]; then gh issue comment "$EXISTING" --body "$BODY"; else gh issue create --title "$TITLE" --body "$BODY"; fi

      - name: Remove private key
        if: always()
        run: rm -f "$RUNNER_TEMP/data-private.pem" "$RUNNER_TEMP/derived-public.pem"
