name: Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Build and publish a protected signed release"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  android:
    name: Test and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run deterministic quality gate
        run: python scripts/run_quality_gate.py --strict-native-lanes

      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Android tests and lint
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug lintRelease assembleDebugAndroidTest --stacktrace

      - name: Enable KVM for Android emulator
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run reader UI smoke tests on Android emulator
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: ./gradlew --no-daemon connectedDebugAndroidTest --stacktrace

      - name: Build debug APK and unsigned release bundle
        run: ./gradlew --no-daemon assembleDebug bundleRelease --stacktrace

      - name: Generate artifact checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/checksums
          find app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > release/checksums/SHA256SUMS.txt

      - name: Upload Android artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: OrthodoxPrayers-build-${{ github.sha }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/bundle/release/app-release.aab
            app/build/reports/lint-results-*.html
            release/checksums/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: java-kotlin
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  release:
    name: Protected signed APK and AAB
    needs: android
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Import latest signed verified data
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin verified-data
          VERIFIED_DIR="$RUNNER_TEMP/verified-data"
          git worktree add --force --detach "$VERIFIED_DIR" origin/verified-data
          rsync -a --delete "$VERIFIED_DIR/data/" data/
          rsync -a --delete "$VERIFIED_DIR/app/src/main/assets/data/" app/src/main/assets/data/
          git worktree remove --force "$VERIFIED_DIR"
          echo "ORTHODOX_DATE=$(TZ=Asia/Amman date +%F)" >> "$GITHUB_ENV"

      - name: Run release-strict quality gate
        run: |
          python scripts/run_quality_gate.py --require-current --strict-native-lanes
          python scripts/validate_release_readiness.py

      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)"
          fi
          test -n "$VERSION"
          APP_VERSION="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)"
          test "$VERSION" = "$APP_VERSION" || { echo "Tag/version mismatch: $VERSION != $APP_VERSION" >&2; exit 1; }
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore protected Android signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in ANDROID_KEYSTORE_B64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            test -n "${!value}" || { echo "$value is required" >&2; exit 1; }
          done
          printf '%s' "$ANDROID_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/orthodox-release.keystore"
          chmod 600 "$RUNNER_TEMP/orthodox-release.keystore"
          keytool -list -keystore "$RUNNER_TEMP/orthodox-release.keystore" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/orthodox-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK and AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean testDebugUnitTest lintRelease assembleRelease bundleRelease --stacktrace

      - name: Verify and collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/OrthodoxPrayers-$RELEASE_VERSION.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release/OrthodoxPrayers-$RELEASE_VERSION.aab"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "release/OrthodoxPrayers-$RELEASE_VERSION.apk"
          (cd release && sha256sum "OrthodoxPrayers-$RELEASE_VERSION.apk" "OrthodoxPrayers-$RELEASE_VERSION.aab" > SHA256SUMS.txt)

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: OrthodoxPrayers-${{ env.RELEASE_VERSION }}-signed
          path: release/
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes

      - name: Remove signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/orthodox-release.keystore"
