name: Update World Cup 2026 every 15 minutes

"on":
  # إعادة تسجيل الجدولة بشكل واضح كل 15 دقيقة بتوقيت GitHub (UTC).
  schedule:
    - cron: "*/15 * * * *"

  # أول رفع لملفات الإصلاح يشغّل التحديث فوراً مرة واحدة.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-worldcup-2026.yml"
      - "scripts/worldcup-final-four-official-fix.mjs"
      - "APPLY_WORLD_CUP_FINAL_FOUR_FIX.bat"

  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source: manual / github-watchdog / cloudflare-cron"
        required: false
        default: "manual"
      forced_at:
        description: "External scheduler timestamp, if any"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: worldcup-2026-quarter-hour
  cancel-in-progress: false

env:
  TZ: Asia/Amman
  WORLD_CUP_2026_FORCE_UPDATE: "1"
  WORLD_CUP_2026_INTERVAL_MINUTES: "15"
  WORLD_CUP_2026_START_DATE: "2026-06-11"
  WORLD_CUP_2026_END_DATE: "2026-07-19"
  WORLD_CUP_2026_TRIGGER_SOURCE: ${{ github.event.inputs.source || github.event_name }}
  WORLD_CUP_2026_FORCED_AT: ${{ github.event.inputs.forced_at || '' }}
  WORLD_CUP_2026_ESPN_SCOREBOARD_URL: ${{ vars.WORLD_CUP_2026_ESPN_SCOREBOARD_URL || 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=950' }}
  CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}

jobs:
  update-worldcup-2026:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_FOR_AUTOMATION || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Print trigger info
        shell: bash
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "trigger_source=${WORLD_CUP_2026_TRIGGER_SOURCE}"
          echo "forced_at=${WORLD_CUP_2026_FORCED_AT}"

      - name: Validate original quarter-hour updater
        run: node --check scripts/worldcup-quarter-hour-force.mjs

      - name: Validate Round of 32 official correction
        run: node --check scripts/worldcup-r32-official-fix.mjs

      - name: Validate knockout live sync
        run: node --check scripts/worldcup-knockout-live-sync.mjs

      - name: Validate official final-four correction
        run: node --check scripts/worldcup-final-four-official-fix.mjs

      - name: Run original quarter-hour updater with integrated knockout patch
        run: node scripts/worldcup-quarter-hour-force.mjs

      - name: Apply official Round of 32 pairings correction
        run: node scripts/worldcup-r32-official-fix.mjs

      - name: Sync knockout live advancement cards
        run: node scripts/worldcup-knockout-live-sync.mjs

      # يجب أن يكون آخر تصحيح للبيانات حتى لا يعيد مصدر خارجي سويسرا إلى النهائي.
      - name: Apply verified semifinal and final correction
        run: node scripts/worldcup-final-four-official-fix.mjs

      - name: Commit changed World Cup data files
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            public/worldcup-2026/matches.json \
            public/worldcup-2026/standings.json \
            public/worldcup-2026/groups.json \
            public/worldcup-2026/bracket.json \
            public/worldcup-2026/knockout-live.json \
            public/worldcup-2026/knockout-live-health.json \
            public/worldcup-2026/bracket-linker-status.json \
            public/worldcup-2026/r32-correction-status.json \
            public/worldcup-2026/final-four-correction-status.json \
            public/worldcup-2026/heartbeat.json \
            public/worldcup-2026/update-check.json \
            public/worldcup-2026/version.json \
            public/worldcup-2026/update-errors.json \
            public/worldcup-2026/deploy-marker.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changed files to commit."
            exit 0
          fi

          stamp="$(TZ=Asia/Amman date +'%Y-%m-%d %H:%M:%S %Z')"
          git commit -m "World Cup 2026 15-minute data update ${stamp}"
          git pull --rebase --autostash origin main || true
          git push origin HEAD:main || { git pull --rebase --autostash origin main; git push origin HEAD:main; }
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Cloudflare Pages deploy hook if configured
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_PAGES_DEPLOY_HOOK:-}" ]; then
            echo "CLOUDFLARE_PAGES_DEPLOY_HOOK is not set; skipping deploy hook."
            echo "If Cloudflare Pages is connected to GitHub, the push above should deploy automatically."
            exit 0
          fi

          echo "Triggering Cloudflare Pages deploy hook..."
          curl --fail --show-error --silent --request POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK"
          echo "Cloudflare Pages deploy hook triggered."
